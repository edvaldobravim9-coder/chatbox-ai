<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbox - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a0a2e 0%, #1a1040 50%, #0a1240 100%);
      color: #e0e0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: rgba(30, 30, 60, 0.9);
      border: 1px solid #3a3a6e;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 0 30px rgba(80, 80, 180, 0.2);
    }
    .login-card h1 {
      font-size: 28px;
      margin-bottom: 8px;
      color: #ffffff;
    }
    .login-card p {
      color: #a0a0c0;
      margin-bottom: 32px;
      font-size: 14px;
    }
    .oauth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px;
      border: 1px solid #4a4a8a;
      border-radius: 10px;
      background: rgba(40, 40, 80, 0.6);
      color: #d0d0f0;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 12px;
      transition: background 0.2s;
    }
    .oauth-btn:hover { background: rgba(60, 60, 120, 0.8); }
    .oauth-btn img { width: 20px; height: 20px; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>💬 Chatbox</h1>
    <p>Faça login para continuar</p>
    <a href="/auth/google" class="oauth-btn">
      <img src="https://www.google.com/favicon.ico" alt="Google"> Entrar com Google
    </a>
    <a href="/auth/github" class="oauth-btn">
      <img src="https://github.githubassets.com/favicons/favicon-dark.svg" alt="GitHub"> Entrar com GitHub
    </a>
  </div>
</body>
</html>
