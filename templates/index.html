<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Chatbox</title>
  <style>
    :root {
      --bg-primary: #0b0b1e;
      --bg-secondary: #151538;
      --bg-message-user: #1e1e4a;
      --bg-message-assistant: #252550;
      --text-primary: #e8e8f8;
      --text-secondary: #aaaacc;
      --brand-blue: #4f7dff;
      --brand-green: #4ddfb4;
      --border-color: #2a2a5a;
      --sidebar-bg: #0d0d24;
      --gradient-body: linear-gradient(160deg, #0a0a2e 0%, #1a1a40 40%, #101040 70%, #0a0a2e 100%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--gradient-body);
      color: var(--text-primary);
      display: flex;
      height: 100dvh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      padding: 12px;
      flex-shrink: 0;
      border-right: 1px solid var(--border-color);
    }

    .sidebar .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: rgba(30,30,70,0.5);
      border-radius: 10px;
      margin-bottom: 16px;
      border: 1px solid var(--border-color);
    }

    .sidebar .user-info .avatar-circle {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--brand-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: white;
      flex-shrink: 0;
    }

    .sidebar .user-info .user-name {
      font-size: 14px;
      font-weight: 500;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sidebar .user-info .logout-btn {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 12px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .sidebar .user-info .logout-btn:hover { background: rgba(255,255,255,0.08); }

    .sidebar button.new-chat {
      background: var(--brand-blue);
      border: none;
      color: white;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s;
      margin-bottom: 16px;
    }

    .sidebar button.new-chat:hover { background: #5b8aff; }

    .sidebar .history {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sidebar .chat-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-secondary);
      transition: background 0.1s;
    }

    .sidebar .chat-item:hover { background: rgba(255,255,255,0.06); }
    .sidebar .chat-item.active { background: rgba(79,125,255,0.15); color: var(--text-primary); }

    .sidebar .footer {
      padding: 12px 8px 0;
      border-top: 1px solid var(--border-color);
      margin-top: auto;
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    .message-row {
      display: flex;
      padding: 20px 16%;
      gap: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.02);
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-row.user { background: var(--bg-message-user); }
    .message-row.assistant { background: var(--bg-message-assistant); }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 4px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 13px;
      flex-shrink: 0;
    }

    .user .avatar { background: var(--brand-blue); }
    .assistant .avatar { background: var(--brand-green); }

    .message-content {
      line-height: 1.7;
      flex: 1;
      font-size: 15px;
    }

    .message-content strong { color: #ffffff; font-weight: 700; }
    .message-content em { color: #d0d0f0; font-style: italic; }
    .message-content code {
      background: rgba(0,0,0,0.3);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      color: #f0c050;
    }
    .message-content blockquote {
      border-left: 3px solid var(--brand-green);
      padding-left: 12px;
      margin: 8px 0;
      color: #aaaacc;
      font-style: italic;
    }
    .message-content ul, .message-content ol { padding-left: 20px; margin: 6px 0; }
    .message-content li { margin: 3px 0; }
    .message-content hr { border: none; border-top: 1px solid var(--border-color); margin: 12px 0; }

    .thinking-block {
      background: rgba(0,0,0,0.2);
      border-left: 3px solid var(--brand-green);
      padding: 10px 14px;
      margin: 10px 0;
      border-radius: 6px;
      font-size: 13px;
      color: #aaaacc;
    }

    .thinking-block summary {
      color: var(--brand-green);
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }

    .thinking-block pre {
      white-space: pre-wrap;
      font-family: inherit;
      margin-top: 6px;
    }

    .input-area {
      padding: 12px 16% 24px;
      background: linear-gradient(180deg, transparent 0%, #0b0b1e 20%);
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      background: var(--bg-message-assistant);
      border-radius: 16px;
      border: 1px solid var(--border-color);
      padding: 8px 14px;
      box-shadow: 0 0 15px rgba(79,125,255,0.05);
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: var(--brand-blue);
    }

    .input-wrapper textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-primary);
      resize: none;
      font-size: 15px;
      padding: 8px 0;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      max-height: 200px;
    }

    .input-wrapper textarea::placeholder { color: #6666a0; font-style: italic; }
    .input-wrapper input[type="file"] { display: none; }

    .btn {
      background: transparent;
      border: none;
      color: #7777aa;
      cursor: pointer;
      padding: 6px;
      font-size: 18px;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }

    .btn:hover { color: var(--text-primary); }

    .btn.send {
      color: var(--brand-blue);
      font-size: 20px;
      padding: 4px;
      opacity: 0.6;
      transition: opacity 0.15s;
    }

    .btn.send.enabled { opacity: 1; }

    .file-pill {
      background: rgba(0,0,0,0.3);
      padding: 4px 10px;
      border-radius: 12px;
      margin-right: 8px;
      font-size: 12px;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3a3a6a; border-radius: 3px; }

    .typing-dots {
      display: inline-flex;
      gap: 4px;
      padding: 4px 0;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      background: var(--text-secondary);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
    .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="user-info">
      <div class="avatar-circle">{{ current_user.name[0].upper() }}</div>
      <span class="user-name">{{ current_user.name }}</span>
      <a href="/logout" class="logout-btn" title="Sair">⏻</a>
    </div>
    <button class="new-chat" onclick="newChat()">+ Novo chat</button>
    <div class="history" id="history"></div>
    <div class="footer">
      <span>🔓 Modo Dev</span>
      <input type="checkbox" id="jailbreakCheckbox" style="margin-left: auto; accent-color: #ff6b6b;">
    </div>
  </div>

  <div class="main">
    <div class="chat-container" id="chatContainer"></div>
    <div class="input-area">
      <div class="input-wrapper">
        <label class="btn" title="Anexar arquivo">📎
          <input type="file" id="fileInput" onchange="handleFile(this)" accept=".pdf,.doc,.docx,.txt,.md,.csv,.xls,.xlsx,.ppt,.pptx,.jpg,.jpeg,.png,.bmp,.py,.java,.cpp,.js,.html,.css,.json,.xml,.zip">
        </label>
        <div id="filePreview" style="display:flex; align-items:center; flex-wrap:wrap;"></div>
        <textarea id="userInput" rows="1" placeholder="Envie uma mensagem..." oninput="autoResize(this); updateSendButton()" onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault(); sendMessage();}"></textarea>
        <button class="btn send" id="sendButton" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>

  <script>
    const CHAT_URL = '/chat';
    const UPLOAD_URL = '/upload';
    const CONVERSATIONS_URL = '/conversations';

    let conversations = [];
    let activeConvIndex = -1;
    let activeConvId = null;
    let currentFile = null;
    let pendingFileContent = null; // Armazena o texto extraído, sem exibir no textarea
    let pendingFileName = null; // Armazena o nome do arquivo, para usar na mensagem se vazia
    let isLoading = false;

    function markdownToHtml(text) {
      if (!text) return '';
      let safe = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      safe = safe.replace(/`([^`]+)`/g, '<code>$1</code>');
      safe = safe.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      safe = safe.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
      safe = safe.replace(/^&gt; (.*)$/gm, '<blockquote>$1</blockquote>');
      safe = safe.replace(/^- (.*)$/gm, '<li>$1</li>');
      safe = safe.replace(/(<li>.+<\/li>)/gs, '<ul>$1</ul>');
      safe = safe.replace(/^---$/gm, '<hr>');
      safe = safe.replace(/\n\n/g, '</p><p>');
      safe = '<p>' + safe + '</p>';
      safe = safe.replace(/<p>\s*<\/p>/g, '');
      return safe;
    }

    async function loadConversations() {
      try {
        const resp = await fetch(CONVERSATIONS_URL);
        const data = await resp.json();
        conversations = [];
        for (const c of data) {
          const msgResp = await fetch(`/conversations/${c.id}`);
          const msgs = await msgResp.json();
          conversations.push({ id: c.id, title: c.title, messages: msgs });
        }
        if (conversations.length > 0) {
          activeConvIndex = 0;
          activeConvId = conversations[0].id;
          switchChat(0);
        } else {
          newChat();
        }
        renderHistory();
      } catch (e) {
        console.error('Erro ao carregar conversas:', e);
        newChat();
      }
    }

    function newChat() {
      activeConvId = null;
      conversations.unshift({ id: null, title: 'Nova conversa', messages: [] });
      activeConvIndex = 0;
      renderHistory();
      document.getElementById('chatContainer').innerHTML = '';
      clearFileSelection();
    }

    async function switchChat(index) {
      activeConvIndex = index;
      activeConvId = conversations[index].id;
      renderHistory();
      const container = document.getElementById('chatContainer');
      container.innerHTML = '';
      const msgs = conversations[index].messages;
      msgs.forEach(m => {
        if (m.role === 'user' || m.role === 'assistant') {
          appendMessage(m.role, m.content, m.thinking);
        }
      });
      container.scrollTop = container.scrollHeight;
    }

    function renderHistory() {
      const hist = document.getElementById('history');
      hist.innerHTML = '';
      conversations.forEach((conv, idx) => {
        const div = document.createElement('div');
        div.className = 'chat-item' + (idx === activeConvIndex ? ' active' : '');
        div.textContent = conv.title;
        div.onclick = () => switchChat(idx);
        hist.appendChild(div);
      });
    }

    function handleFile(input) {
      if (input.files.length > 0) {
        currentFile = input.files[0];
        updateFilePreview();
        updateSendButton(); // Atualiza o botão de envio
      }
    }

    function updateFilePreview() {
      const preview = document.getElementById('filePreview');
      preview.innerHTML = '';
      if (currentFile) {
        const pill = document.createElement('span');
        pill.className = 'file-pill';
        pill.innerHTML = `📄 ${currentFile.name} <span onclick="clearFileSelection()" style="cursor:pointer;font-weight:bold;">×</span>`;
        preview.appendChild(pill);
      }
    }

    function clearFileSelection() {
      currentFile = null;
      pendingFileContent = null;
      pendingFileName = null;
      document.getElementById('fileInput').value = '';
      updateFilePreview();
      updateSendButton();
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 200) + 'px';
    }

    function updateSendButton() {
      const btn = document.getElementById('sendButton');
      const input = document.getElementById('userInput');
      // Habilita o botão se houver texto OU arquivo selecionado
      btn.classList.toggle('enabled', input.value.trim().length > 0 || currentFile);
    }

    async function sendMessage() {
      if (isLoading) return;
      const input = document.getElementById('userInput');
      let message = input.value.trim();

      // Se há arquivo selecionado e ainda não foi extraído
      if (currentFile && !pendingFileContent) {
        const formData = new FormData();
        formData.append('file', currentFile);
        try {
          const resp = await fetch(UPLOAD_URL, { method: 'POST', body: formData });
          const data = await resp.json();
          if (data.error) { alert(data.error); return; }
          // Armazena o conteúdo, mas NÃO coloca no textarea
          pendingFileContent = data.content;
          pendingFileName = data.filename;
          // Remove o arquivo do input, mas mantém o pill
          document.getElementById('fileInput').value = '';
          currentFile = null;
          // Se não há mensagem, a mensagem será só sobre o arquivo
          if (!message) {
            // Não envia automaticamente, apenas permite que o usuário clique novamente
            updateSendButton();
            return;
          }
        } catch (e) {
          alert('Erro no upload: ' + e.message);
          return;
        }
      }

      // Se não há mensagem mas há conteúdo de arquivo pendente, envia com mensagem padrão
      if (!message && pendingFileContent) {
        message = `Analise o arquivo "${pendingFileName}".`;
      }

      if (!message) return;

      isLoading = true;

      // Monta a mensagem a ser exibida no chat
      let displayMessage = message;
      appendMessage('user', displayMessage);
      input.value = '';
      autoResize(input);
      updateSendButton();
      // Não limpa o pendingFileContent aqui, pois ele será enviado no payload

      if (activeConvIndex === -1) newChat();
      const conv = conversations[activeConvIndex];
      conv.messages.push({ role: 'user', content: displayMessage });

      const fileContent = pendingFileContent;
      pendingFileContent = null;
      pendingFileName = null;
      updateFilePreview(); // Remove o pill após envio

      const payload = {
        message: displayMessage,
        file_content: fileContent,
        conversation_id: activeConvId,
        jailbreak: document.getElementById('jailbreakCheckbox').checked
      };

      const assistantRow = appendMessage('assistant', '', '', true);
      const msgContent = assistantRow.querySelector('.message-content');
      const typingDiv = document.createElement('div');
      typingDiv.className = 'typing-dots';
      typingDiv.innerHTML = '<span></span><span></span><span></span>';
      msgContent.appendChild(typingDiv);

      try {
        const response = await fetch(CHAT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        const fullThinking = data.thinking || '';
        const fullAnswer = data.answer || '';
        activeConvId = data.conversation_id;

        typingDiv.remove();
        if (fullThinking) {
          const details = document.createElement('details');
          details.className = 'thinking-block';
          details.innerHTML = `<summary>🧠 Raciocínio</summary><pre>${fullThinking}</pre>`;
          msgContent.appendChild(details);
        }
        if (fullAnswer) {
          const answerDiv = document.createElement('div');
          answerDiv.innerHTML = markdownToHtml(fullAnswer);
          msgContent.appendChild(answerDiv);
        }
        conv.messages.push({ role: 'assistant', content: fullAnswer, thinking: fullThinking });
        conv.id = activeConvId;
        if (conv.title === 'Nova conversa' || conv.title === '(vazio)') {
          conv.title = displayMessage.substring(0, 50) + (displayMessage.length > 50 ? '...' : '');
        }
        renderHistory();
      } catch (e) {
        typingDiv.remove();
        msgContent.innerHTML += '<br>Erro: ' + e.message;
      }
      isLoading = false;
    }

    function appendMessage(role, content, thinking = '', streaming = false) {
      const container = document.getElementById('chatContainer');
      const row = document.createElement('div');
      row.className = 'message-row ' + role;
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'user' ? 'U' : 'C';
      row.appendChild(avatar);
      const msgDiv = document.createElement('div');
      msgDiv.className = 'message-content';
      if (thinking) {
        const details = document.createElement('details');
        details.className = 'thinking-block';
        details.innerHTML = `<summary>🧠 Raciocínio</summary><pre>${thinking}</pre>`;
        msgDiv.appendChild(details);
      }
      if (content && !streaming) {
        const textDiv = document.createElement('div');
        textDiv.innerHTML = markdownToHtml(content);
        msgDiv.appendChild(textDiv);
      }
      row.appendChild(msgDiv);
      container.appendChild(row);
      container.scrollTop = container.scrollHeight;
      return row;
    }

    loadConversations();
  </script>
</body>
</html>
