<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Chatbox</title>
  <style>
    :root {
      --gray-50: #f7f7f8;
      --gray-100: #ececf1;
      --gray-200: #d9d9e3;
      --gray-300: #c5c5d2;
      --gray-400: #acacbe;
      --gray-500: #8e8ea0;
      --gray-600: #6e6e80;
      --gray-700: #565869;
      --gray-800: #444654;
      --gray-900: #343541;
      --gray-950: #202123;
      --brand-green: #19c37d;
      --brand-blue: #0a84ff;
      --text-primary: #ececf1;
      --text-secondary: #c5c5d2;
      --surface-primary: #343541;
      --surface-secondary: #444654;
      --border-color: #4d4d5c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--surface-primary);
      color: var(--text-primary);
      display: flex;
      height: 100dvh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ====== SIDEBAR ====== */
    .sidebar {
      width: 260px;
      background: var(--gray-950);
      display: flex;
      flex-direction: column;
      padding: 8px;
      flex-shrink: 0;
    }

    .sidebar .logo-area {
      padding: 8px 12px 16px;
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    .sidebar button.new-chat {
      background: var(--brand-blue);
      border: none;
      color: white;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s;
      margin-bottom: 12px;
    }

    .sidebar button.new-chat:hover { background: #1a8cff; }

    .sidebar .history {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sidebar .chat-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-secondary);
      transition: background 0.1s;
    }

    .sidebar .chat-item:hover { background: #2a2b32; }
    .sidebar .chat-item.active { background: var(--surface-primary); color: var(--text-primary); }

    .sidebar .footer {
      padding: 12px 8px 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin-top: auto;
      font-size: 12px;
      color: var(--gray-500);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ====== MAIN ====== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    .message-row {
      display: flex;
      padding: 20px 16%;
      gap: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-row.assistant { background: var(--surface-secondary); }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 3px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 13px;
      flex-shrink: 0;
      letter-spacing: -0.2px;
    }

    .user .avatar { background: var(--brand-blue); }
    .assistant .avatar { background: var(--brand-green); }

    .message-content {
      line-height: 1.7;
      white-space: pre-wrap;
      flex: 1;
      font-size: 15px;
    }

    .thinking-block {
      background: #2d2d3a;
      border-left: 3px solid var(--brand-green);
      padding: 10px 14px;
      margin: 10px 0;
      border-radius: 6px;
      font-size: 13px;
      color: #a0a0b0;
    }

    .thinking-block summary {
      color: var(--brand-green);
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }

    .file-badge {
      background: #2d2d3a;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    /* ====== INPUT BAR ====== */
    .input-area {
      padding: 12px 16% 24px;
      background: linear-gradient(180deg, transparent 0%, var(--surface-primary) 20%);
    }

    .jailbreak-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #ff6b6b;
      font-size: 13px;
      margin-bottom: 10px;
      padding-left: 2px;
    }

    .jailbreak-toggle input[type="checkbox"] {
      accent-color: #ff6b6b;
      width: 15px;
      height: 15px;
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      background: var(--surface-secondary);
      border-radius: 16px;
      border: 1px solid var(--border-color);
      padding: 8px 14px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: var(--brand-blue);
    }

    .input-wrapper textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-primary);
      resize: none;
      font-size: 15px;
      padding: 8px 0;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      max-height: 200px;
    }

    .input-wrapper textarea::placeholder {
      color: var(--gray-500);
      font-style: italic;
    }

    .input-wrapper input[type="file"] { display: none; }

    .btn {
      background: transparent;
      border: none;
      color: var(--gray-400);
      cursor: pointer;
      padding: 6px;
      font-size: 18px;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }

    .btn:hover { color: var(--text-primary); }

    .btn.send {
      color: var(--brand-blue);
      font-size: 20px;
      padding: 4px;
      opacity: 0.6;
      transition: opacity 0.15s;
    }

    .btn.send.enabled { opacity: 1; }

    .file-pill {
      background: #2d2d3a;
      padding: 4px 10px;
      border-radius: 12px;
      margin-right: 8px;
      font-size: 12px;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #565869; border-radius: 3px; }

    /* typing dots */
    .typing-dots {
      display: inline-flex;
      gap: 4px;
      padding: 4px 0;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      background: var(--gray-400);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
    .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo-area">💬 Chatbox</div>
    <button class="new-chat" onclick="newChat()">+ Novo chat</button>
    <div class="history" id="history"></div>
    <div class="footer">
      <span>🔓 Modo Dev</span>
      <input type="checkbox" id="jailbreakCheckbox" style="margin-left: auto; accent-color: #ff6b6b;">
    </div>
  </div>

  <div class="main">
    <div class="chat-container" id="chatContainer"></div>
    <div class="input-area">
      <div class="input-wrapper">
        <label class="btn" title="Anexar arquivo">📎
          <input type="file" id="fileInput" onchange="handleFile(this)" accept=".pdf,.doc,.docx,.txt,.md,.csv,.xls,.xlsx,.ppt,.pptx,.jpg,.jpeg,.png,.bmp,.py,.java,.cpp,.js,.html,.css,.json,.xml,.zip">
        </label>
        <div id="filePreview" style="display:flex; align-items:center; flex-wrap:wrap;"></div>
        <textarea id="userInput" rows="1" placeholder="Envie uma mensagem..." oninput="autoResize(this); updateSendButton()" onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault(); sendMessage();}"></textarea>
        <button class="btn send" id="sendButton" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>

  <script>
    const CHAT_URL = '/chat';
    const UPLOAD_URL = '/upload';

    let conversations = [];
    let activeConvIndex = -1;
    let currentFile = null;
    let pendingFileContent = null;
    let isLoading = false;

    // ========== FUNÇÕES DE GERENCIAMENTO ==========
    function newChat() {
      conversations.push([]);
      activeConvIndex = conversations.length - 1;
      renderHistory();
      document.getElementById('chatContainer').innerHTML = '';
      clearFileSelection();
    }

    function switchChat(index) {
      activeConvIndex = index;
      renderHistory();
      const messages = conversations[index];
      const container = document.getElementById('chatContainer');
      container.innerHTML = '';
      messages.forEach(m => appendMessage(m.role, m.content, m.thinking));
      container.scrollTop = container.scrollHeight;
    }

    function renderHistory() {
      const hist = document.getElementById('history');
      hist.innerHTML = '';
      conversations.forEach((conv, idx) => {
        const first = conv.length > 0 ? conv[0].content.substring(0, 25) : '(vazio)';
        const div = document.createElement('div');
        div.className = 'chat-item' + (idx === activeConvIndex ? ' active' : '');
        div.textContent = first;
        div.onclick = () => switchChat(idx);
        hist.appendChild(div);
      });
    }

    function handleFile(input) {
      if (input.files.length > 0) {
        currentFile = input.files[0];
        updateFilePreview();
      }
    }

    function updateFilePreview() {
      const preview = document.getElementById('filePreview');
      preview.innerHTML = '';
      if (currentFile) {
        const pill = document.createElement('span');
        pill.className = 'file-pill';
        pill.innerHTML = `📄 ${currentFile.name} <span onclick="clearFileSelection()" style="cursor:pointer;font-weight:bold;">×</span>`;
        preview.appendChild(pill);
      }
    }

    function clearFileSelection() {
      currentFile = null;
      pendingFileContent = null;
      document.getElementById('fileInput').value = '';
      updateFilePreview();
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 200) + 'px';
    }

    function updateSendButton() {
      const btn = document.getElementById('sendButton');
      const input = document.getElementById('userInput');
      btn.classList.toggle('enabled', input.value.trim().length > 0 || currentFile);
    }

    // ========== ENVIO DE MENSAGENS ==========
    async function sendMessage() {
      if (isLoading) return;
      const input = document.getElementById('userInput');
      let message = input.value.trim();

      if (currentFile) {
        const formData = new FormData();
        formData.append('file', currentFile);
        try {
          const resp = await fetch(UPLOAD_URL, { method: 'POST', body: formData });
          const data = await resp.json();
          if (data.error) { alert(data.error); return; }
          const filePreview = `[Arquivo "${data.filename}"]\n${data.content}\n\n`;
          if (!message) message = filePreview + "Analise o arquivo acima.";
          else message = filePreview + message;
          pendingFileContent = data.content;
          clearFileSelection();
          input.value = message;
          autoResize(input);
          updateSendButton();
          return;
        } catch (e) {
          alert('Erro no upload: ' + e.message);
          return;
        }
      }

      if (!message) return;

      isLoading = true;
      appendMessage('user', message);
      input.value = '';
      autoResize(input);
      updateSendButton();

      if (activeConvIndex === -1) newChat();
      const conv = conversations[activeConvIndex];
      conv.push({ role: 'user', content: message });

      const fileContent = pendingFileContent;
      pendingFileContent = null;

      const payload = {
        message: message,
        file_content: fileContent,
        history: conv.slice(0, -1).map(m => ({ role: m.role, content: m.content })),
        jailbreak: document.getElementById('jailbreakCheckbox').checked
      };

      const assistantRow = appendMessage('assistant', '', '', true);
      const msgContent = assistantRow.querySelector('.message-content');
      const typingDiv = document.createElement('div');
      typingDiv.className = 'typing-dots';
      typingDiv.innerHTML = '<span></span><span></span><span></span>';
      msgContent.appendChild(typingDiv);

      try {
        const response = await fetch(CHAT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        const fullThinking = data.thinking || '';
        const fullAnswer = data.answer || '';

        typingDiv.remove();
        if (fullThinking) {
          const details = document.createElement('details');
          details.className = 'thinking-block';
          details.innerHTML = `<summary>🧠 Raciocínio</summary><pre>${fullThinking}</pre>`;
          msgContent.appendChild(details);
        }
        if (fullAnswer) {
          const answerDiv = document.createElement('div');
          answerDiv.textContent = fullAnswer;
          msgContent.appendChild(answerDiv);
        }
        conv.push({ role: 'assistant', content: fullAnswer, thinking: fullThinking });
        renderHistory();
      } catch (e) {
        typingDiv.remove();
        msgContent.innerHTML += '<br>Erro: ' + e.message;
      }
      isLoading = false;
    }

    function appendMessage(role, content, thinking = '', streaming = false) {
      const container = document.getElementById('chatContainer');
      const row = document.createElement('div');
      row.className = 'message-row ' + role;
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'user' ? 'U' : 'C';
      row.appendChild(avatar);
      const msgDiv = document.createElement('div');
      msgDiv.className = 'message-content';
      if (thinking) {
        const details = document.createElement('details');
        details.className = 'thinking-block';
        details.innerHTML = `<summary>🧠 Raciocínio</summary><pre>${thinking}</pre>`;
        msgDiv.appendChild(details);
      }
      if (content && !streaming) {
        const textP = document.createElement('div');
        textP.textContent = content;
        msgDiv.appendChild(textP);
      }
      row.appendChild(msgDiv);
      container.appendChild(row);
      container.scrollTop = container.scrollHeight;
      return row;
    }

    newChat();
  </script>
</body>
</html>
